<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Heebo', sans-serif;
    background: #070d1a;
    color: #e2e8f0;
    padding: 0 0 30px;
    font-size: 12px;
    line-height: 1.6;
    direction: rtl;
  }

  /* ── Cover / Title page ── */
  .cover {
    text-align: center;
    padding: 40px 40px 32px;
    border-bottom: 2px solid #c9a84c;
    margin-bottom: 32px;
  }

  .cover-emblem {
    margin-bottom: 18px;
  }

  .cover-emblem img {
    height: 110px;
    filter: brightness(0) invert(1) drop-shadow(0 0 20px rgba(201,168,76,.6));
  }

  .cover-unit {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #a08838;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .cover-title {
    font-size: 22px;
    font-weight: 900;
    color: #c9a84c;
    margin-bottom: 6px;
  }

  .cover-subtitle {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 16px;
  }

  .cover-meta {
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 12px;
    color: #94a3b8;
  }

  .cover-meta span { white-space: nowrap; }
  .cover-meta .count { color: #c9a84c; font-weight: 700; }

  /* ── Section body ── */
  .body { padding: 0 40px; }

  /* ── Actor section ── */
  .actor-section {
    margin-bottom: 24px;
    page-break-inside: avoid;
  }

  .actor-header {
    font-size: 13px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 6px;
    margin-bottom: 8px;
  }

  .actor-header.actor-HEZBOLLAH { background: #9a341222; border-right: 4px solid #ea580c; color: #fdba74; }
  .actor-header.actor-HAMAS     { background: #991b1b22; border-right: 4px solid #dc2626; color: #fca5a5; }
  .actor-header.actor-IRAN      { background: #5b21b622; border-right: 4px solid #7c3aed; color: #c4b5fd; }
  .actor-header.actor-OTHERS    { background: #16653422; border-right: 4px solid #16a34a; color: #86efac; }

  /* ── Item card — sitrep format ── */
  .item-card {
    background: #0d1a30;
    border-radius: 6px;
    margin-bottom: 7px;
    overflow: hidden;
    page-break-inside: avoid;
  }

  .item-card.item-HEZBOLLAH { border-right: 3px solid #ea580c; }
  .item-card.item-HAMAS     { border-right: 3px solid #dc2626; }
  .item-card.item-IRAN      { border-right: 3px solid #7c3aed; }
  .item-card.item-OTHERS    { border-right: 3px solid #16a34a; }

  .item-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 10px;
    border-bottom: 1px solid #1e293b;
    background: rgba(0,0,0,.2);
  }

  .item-time {
    font-size: 12px;
    font-weight: 900;
    color: #c9a84c;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  .item-id {
    font-size: 9px;
    font-weight: 700;
    color: #475569;
    background: #070d1a;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: monospace;
    flex-shrink: 0;
  }

  .domain-tag {
    font-size: 9px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 3px;
    background: rgba(201,168,76,.1);
    color: #a08838;
  }

  .item-body {
    padding: 7px 12px 8px;
    font-size: 11px;
    line-height: 1.65;
    color: #e2e8f0;
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<!-- Cover -->
<div class="cover">
  <div class="cover-emblem">
    <img src="{{LOGO_BASE64}}" alt="לוגו" onerror="this.style.display='none'">
  </div>
  <div class="cover-unit">יל"ק 5550 — יסוד האש</div>
  <div class="cover-title">OSINT {{VERSION}}</div>
  <div class="cover-subtitle">ידיעות מתורגמות ומסווגות — מידע פתוח בלבד</div>
  <div class="cover-meta">
    <span class="count">{{ITEM_COUNT}} ידיעות</span>
    <span>{{DISPLAY_DATE}}</span>
    <span>{{HEBREW_DATE}}</span>
  </div>
</div>

<!-- Items -->
<div class="body">
  {{ACTORS_SECTIONS}}
</div>

</body>
</html>

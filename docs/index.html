<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT יל"ק 5550 — יסוד האש</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #070d1a;
    --surface: #0d1a30;
    --surface2: #162240;
    --gold: #c9a84c;
    --gold-dim: #a08838;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #475569;
    --border: #1e293b;
  }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    direction: rtl;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .container {
    max-width: 600px;
    width: 100%;
    text-align: center;
  }

  .logo {
    font-size: 48px;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 16px;
    margin-bottom: 32px;
  }

  .latest {
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .latest .version {
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
  }

  .latest .info {
    color: var(--text-dim);
    font-size: 14px;
    margin: 6px 0 14px;
  }

  .btn-main {
    display: inline-block;
    background: var(--gold);
    color: var(--bg);
    padding: 14px 32px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 700;
    font-size: 16px;
    min-height: 48px;
    transition: background 0.2s;
  }

  .btn-main:hover { background: var(--gold-dim); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }

  .archive h2 {
    font-size: 16px;
    color: var(--text-dim);
    margin-bottom: 12px;
    font-weight: 500;
  }

  .archive-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .archive-item {
    background: var(--surface);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .archive-item .ver {
    font-weight: 700;
    color: var(--text);
  }

  .archive-item .detail {
    color: var(--text-dim);
    font-size: 13px;
  }

  .archive-item a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 500;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    background: var(--surface2);
    min-height: 36px;
    display: flex;
    align-items: center;
  }

  .archive-item a:hover { background: var(--border); }

  .footer {
    margin-top: 40px;
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    body { padding: 24px 14px; }
    h1 { font-size: 22px; }
    .logo { font-size: 36px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">&#x1F6E1;</div>
  <h1>OSINT יל"ק 5550 — יסוד האש</h1>
  <div class="subtitle">מערכת מודיעין פתוח</div>

  
      <div class="latest">
        <div class="version">v2026.04.04</div>
        <div class="info">
          <span class="threat-badge threat-HIGH">HIGH</span>
          | 45 פריטים | 2026-04-04
        </div>
        <a href="v2026.04.04/" class="btn-main">כנס לתחקיר האחרון</a>
      </div>

  <hr class="divider">

  <div class="archive">
    <h2>ארכיון גרסאות</h2>
    <ul class="archive-list">
      
      <li class="archive-item">
        <div>
          <span class="ver">v2026.04.04</span>
          <span class="detail"> — 45 פריטים</span>
        </div>
        <a href="v2026.04.04/">פתח</a>
      </li>
    </ul>
  </div>

  <div class="footer">
    יל"ק 5550 — יסוד האש<br>
    רס"ן רועי להב | מידע פתוח בלבד
  </div>
</div>
</body>
</html>
